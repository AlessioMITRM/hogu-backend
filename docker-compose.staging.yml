version: '3.8'

services:
  # 1. Database
  postgres:
    image: postgres:15-alpine
    container_name: staging-postgres
    # Docker Compose inietta automaticamente le variabili definite nel file .env
    env_file: .env 
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ${DB_NAME:-hogu}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # 2. Caching
  redis:
    image: redis:7-alpine
    container_name: staging-redis
    restart: always

  # 3. Message Broker
  rabbitmq:
    image: rabbitmq:management
    container_name: staging-rabbitmq
    restart: always

  # 4. Backend (Spring Boot)
  backend:
    build: 
      context: ./hogu-server
      dockerfile: Dockerfile
    container_name: staging-backend
    env_file:
      - ./hogu-server/.env 
    environment:
      - SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA=hogu
      - SPRING_PROFILES_ACTIVE=stag
      - SPRING_REDIS_HOST=redis
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - postgres
      - redis
      - rabbitmq
    restart: always
    volumes:
      - storage_data:/storage

  # 5. Frontend (React + Nginx Interno Segreto)
  frontend:
    build:
      context: ./hogu-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${CORS_ALLOWED_ORIGIN:-https://staging.hogu.com}
    container_name: staging-frontend
    # NASCONDIAMO le porte dal web esterno! Questo container risponderà solo a Caddy nella rete interna.
    expose:
      - "80"
    depends_on:
      - backend
    restart: always
    volumes:
      - storage_data:/usr/share/nginx/html/files:ro

  # 6. Caddy Reverse Proxy (HTTPS Automatico e Gratuito per Stripe/PayPal)
  caddy:
    image: caddy:2-alpine
    container_name: staging-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    # caddy farà finta di essere staging.hogu.us, chiederà il certificato a let's encrypt 
    # di nascosto sulla porta 80 e rigirerà tutto il traffico sicuro verso staging-frontend!
    command: caddy reverse-proxy --from staging.hogu.us --to staging-frontend:80
    depends_on:
      - frontend

volumes:
  postgres_data:
  storage_data:
