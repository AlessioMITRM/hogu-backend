version: '3.8'

services:
  # 1. Database
  postgres:
    image: postgres:15-alpine
    container_name: staging-postgres
    # Docker Compose inietta automaticamente le variabili definite nel file .env
    env_file: .env 
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: sportellovirtuale
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # 2. Caching
  redis:
    image: redis:7-alpine
    container_name: staging-redis
    restart: always

  # 3. Message Broker
  rabbitmq:
    image: rabbitmq:management
    container_name: staging-rabbitmq
    restart: always

  # 4. Backend (Spring Boot)
  backend:
    build: 
      context: ./hogu-server
      dockerfile: Dockerfile
    container_name: staging-backend
    env_file: .env
    depends_on:
      - postgres
      - redis
      - rabbitmq
    restart: always

  # 5. Frontend & Reverse Proxy (React + Nginx)
  frontend:
    build:
      context: ./hogu-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${CORS_ALLOWED_ORIGIN:-https://staging.hogu.com}/api/v1
    container_name: staging-frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
