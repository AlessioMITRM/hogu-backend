server:
  port: 8080
  address: 0.0.0.0

hogu:
  client:
    url: http://172.18.0.1:5173
    
spring:
  application:
    name: hogu-server

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: |
        SET search_path TO hogu;
        SET TIME ZONE 'UTC';

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: hogu
        jdbc.time_zone: UTC

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
    date-format: yyyy-MM-dd'T'HH:mm:ssXXX

  devtools:
    restart:
      enabled: true
      poll-interval: 2s
      quiet-period: 1s
      additional-paths: target/classes
    livereload:
      enabled: true

springdoc:
  swagger-ui:
    tagsSorter: alpha

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}

stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:dummy_webhook_for_startup}

paypal:
  client-id: ${PAYPAL_CLIENT_ID}
  client-secret: ${PAYPAL_CLIENT_SECRET}
  mode: ${PAYPAL_MODE:sandbox}

aws:
  ses:
    sender-email: ${AWS_SES_SENDER_EMAIL}
    region: ${AWS_SES_REGION:eu-north-1}
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
    
stadia:
  api:
    key: ${STADIA_API_KEY}
    base-url: ${STADIA_BASE_URL:https://api.stadiamaps.com}

logging:
  level:
    org.springframework.boot.devtools: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG
